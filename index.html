<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>高雄市妙音精舍｜聞思修學堂</title>
  <style>
    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background-color: #fdfcf0; overflow: hidden; 
        font-family: "Microsoft JhengHei", sans-serif;
    }
    
    /* === 首頁動畫區 === */
    #scene { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: radial-gradient(circle at 70% 30%, #fdf5e6 0%, #edeada 100%);
        z-index: 10;
        transition: opacity 1.5s ease-in-out;
        cursor: pointer;
    }
    .ambient-glow {
        position: absolute; width: 100%; height: 100%; top: 0; left: 0;
        background: radial-gradient(circle at 30% 70%, rgba(218, 165, 32, 0.15) 0%, transparent 60%);
        animation: glowMove 15s ease-in-out infinite alternate;
    }
    .text-container {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        display: flex; flex-direction: row-reverse; align-items: center; justify-content: center;
        animation: textFloat 6s ease-in-out infinite alternate;
    }
    .title { 
        writing-mode: vertical-rl; font-size: 52px; letter-spacing: 25px; 
        color: #4a3528; margin-left: 30px; font-weight: bold;
    }
    .subtitle { 
        writing-mode: vertical-rl; font-size: 36px; letter-spacing: 18px; color: #6d4c41; 
    }
    @keyframes textFloat { 0% { transform: translate(-50%, -52%); } 100% { transform: translate(-50%, -48%); } }
    @keyframes glowMove { 0% { transform: translate(-5%, -5%); } 100% { transform: translate(5%, 5%); } }
    .fade-out { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <!-- 首頁光韻動畫 -->
  <div id="scene">
    <div class="ambient-glow"></div>
    <div class="text-container">
        <div class="title">高雄市妙音精舍</div>
        <div class="subtitle">     聞思修學堂</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const scene = document.getElementById('scene');
        let isTransitioning = false;
        
        // ⚠️ 指揮官：請把下面這段網址，換成您剛剛建立的 Google Sites 網址！
        const googleSitesUrl = "https://sites.google.com/view/pusa-wsx?usp=sharing";

        function enterSystem() {
            if (isTransitioning) return;
            isTransitioning = true;
            
            // 畫面淡出
            scene.classList.add('fade-out');

            // 等待 1.5 秒淡出動畫結束後，直接「跳轉」到 Google Sites
            setTimeout(() => {
                window.location.href = googleSitesUrl;
            }, 1500); 
        }

        const autoTimer = setTimeout(enterSystem, 7000);

        scene.addEventListener('click', () => {
            clearTimeout(autoTimer);
            enterSystem();
        });
        
        scene.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            clearTimeout(autoTimer);
            enterSystem();
        }, { passive: false });
    });
  </script>
</body>
</html>
